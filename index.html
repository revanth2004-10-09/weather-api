<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Weather App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    transition: 0.5s ease;
}

.container {
    width: 380px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    color: white;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    margin-bottom: 15px;
    font-weight: 600;
}

.search-box {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
}

input {
    padding: 10px;
    border-radius: 30px;
    border: none;
    outline: none;
    width: 70%;
}

button {
    padding: 10px 15px;
    border-radius: 30px;
    border: none;
    margin-left: 5px;
    background: #ffffff;
    color: #333;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background: #ddd;
}

.weather-info {
    display: none;
    margin-top: 20px;
}

.weather-info img {
    width: 80px;
}

.temp {
    font-size: 45px;
    font-weight: bold;
}

.details {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
    font-size: 14px;
}

.loading {
    display: none;
    margin-top: 15px;
}

.error {
    margin-top: 10px;
    color: #ffdddd;
}
</style>
</head>

<body>

<div class="container">
    <h1>🌦 Weather App</h1>

    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Enter city name">
        <button onclick="getWeather()">Search</button>
    </div>

    <div class="loading" id="loading">Loading...</div>
    <div class="error" id="error"></div>

    <div class="weather-info" id="weatherInfo">
        <h2 id="location"></h2>
        <img id="weatherIcon" src="">
        <div class="temp" id="temperature"></div>
        <div id="condition"></div>

        <div class="details">
            <div>💧 Humidity: <span id="humidity"></span>%</div>
            <div>🌬 Wind: <span id="wind"></span> kph</div>
        </div>

        <div class="details">
            <div>🌡 Feels Like: <span id="feelsLike"></span>°C</div>
            <div>🌫 AQI: <span id="aqi"></span></div>
        </div>
    </div>
</div>

<script>
const apiKey = "2e8d9c55cba146f88e0221806262102";

document.getElementById("cityInput")
.addEventListener("keyup", function(event) {
    if (event.key === "Enter") {
        getWeather();
    }
});

async function getWeather() {
    const city = document.getElementById("cityInput").value;
    const weatherInfo = document.getElementById("weatherInfo");
    const loading = document.getElementById("loading");
    const error = document.getElementById("error");

    if (!city) {
        error.innerText = "Please enter a city name!";
        return;
    }

    error.innerText = "";
    weatherInfo.style.display = "none";
    loading.style.display = "block";

    try {
        const response = await fetch(`https://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${city}&aqi=yes`);
        const data = await response.json();

        if (data.error) {
            throw new Error(data.error.message);
        }

        document.getElementById("location").innerText = 
            `${data.location.name}, ${data.location.country}`;
        document.getElementById("temperature").innerText = 
            `${data.current.temp_c}°C`;
        document.getElementById("condition").innerText = 
            data.current.condition.text;
        document.getElementById("weatherIcon").src = 
            "https:" + data.current.condition.icon;
        document.getElementById("humidity").innerText = 
            data.current.humidity;
        document.getElementById("wind").innerText = 
            data.current.wind_kph;
        document.getElementById("feelsLike").innerText = 
            data.current.feelslike_c;
        document.getElementById("aqi").innerText = 
            data.current.air_quality["us-epa-index"];

        changeBackground(data.current.condition.text);

        weatherInfo.style.display = "block";
        loading.style.display = "none";

    } catch (err) {
        loading.style.display = "none";
        error.innerText = "City not found or API error!";
    }
}

function changeBackground(condition) {
    if (condition.includes("Sunny") || condition.includes("Clear")) {
        document.body.style.background = 
        "linear-gradient(135deg, #f6d365, #fda085)";
    } 
    else if (condition.includes("Rain")) {
        document.body.style.background = 
        "linear-gradient(135deg, #4e73df, #1cc88a)";
    } 
    else if (condition.includes("Cloud")) {
        document.body.style.background = 
        "linear-gradient(135deg, #757f9a, #d7dde8)";
    } 
    else {
        document.body.style.background = 
        "linear-gradient(135deg, #4facfe, #00f2fe)";
    }
}
</script>

</body>
</html>
